<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="circle">
      <circle cx="512" cy="512" r="512"/>
    </clipPath>
  </defs>
  <!-- Use the existing logo but clip it to a circle to remove white background corners -->
  <image href="/logo.png" width="1024" height="1024" clip-path="url(#circle)"/>
</svg>
